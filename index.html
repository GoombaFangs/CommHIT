<!doctype html>
<html lang="he" dir="rtl">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>האתר הראשון שלי</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

      <p>תבנית התחלתית לאתר HTML פשוט.</p>
    </header>

    <main class="container">
      <section class="card">
        <h2>על האתר</h2>
        <p>
          זהו עמוד בסיסי שנבנה כדי שתוכל להתחיל לפתח את האתר שלך במהירות.
        </p>
        <button id="helloBtn" type="button">לחץ כאן</button>
        <button id="screenshotBtn" type="button">צלם מסך של העמוד</button>
      </section>
    </main>

    <footer class="site-footer">
      <small>נבנה עם HTML, CSS ו-JavaScript</small>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
      defer
    ></script>
    <script src="script.js"></script>
